# ---------------------------------------------------------------
# Deployment: app-nginx
# ---------------------------------------------------------------
# A minimal nginx deployment used as a third application in the
# App of Apps exercise to demonstrate multi-app management.
# ---------------------------------------------------------------
apiVersion: apps/v1
kind: Deployment
metadata:
  name: app-nginx
  namespace: workshop
  labels:
    app.kubernetes.io/name: app-nginx
spec:
  replicas: 1
  selector:
    matchLabels:
      app: app-nginx
  template:
    metadata:
      labels:
        app: app-nginx
        app.kubernetes.io/name: app-nginx
    spec:
      containers:
        - name: nginx
          image: nginx:1.27-alpine
          ports:
            - containerPort: 80
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 64Mi
