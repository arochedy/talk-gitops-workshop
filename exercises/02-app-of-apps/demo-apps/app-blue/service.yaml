# ---------------------------------------------------------------
# Service: app-blue
# ---------------------------------------------------------------
# Provides a stable ClusterIP for the app-blue Deployment.
# Other services and IngressRoutes use this to reach the app.
# ---------------------------------------------------------------
apiVersion: v1
kind: Service
metadata:
  name: app-blue
  namespace: workshop
spec:
  type: ClusterIP
  selector:
    app: app-blue
  ports:
    - port: 9898
      targetPort: http
      protocol: TCP
      name: http
