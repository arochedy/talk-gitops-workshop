# ---------------------------------------------------------------
# ArgoCD Application: app-green (child)
# ---------------------------------------------------------------
# This child Application is managed by the parent "workshop-apps".
# It deploys the app-green workload from the demo-apps directory.
# ---------------------------------------------------------------
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: app-green
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/stafyniaksacha/talk-gitops-workshop.git
    targetRevision: main
    path: exercises/02-app-of-apps/demo-apps/app-green
  destination:
    server: https://kubernetes.default.svc
    namespace: workshop
  syncPolicy:
    automated:
      selfHeal: true
      prune: true
