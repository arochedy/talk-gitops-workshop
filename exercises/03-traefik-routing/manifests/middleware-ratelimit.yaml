# ---------------------------------------------------------------
# Middleware: rate-limit
# ---------------------------------------------------------------
# A Traefik Middleware is a CRD that modifies requests or
# responses in the routing pipeline. This middleware limits
# the number of requests per second to protect backend services
# from traffic spikes.
#
# To use it, reference it in an IngressRoute:
#   middlewares:
#     - name: rate-limit
# ---------------------------------------------------------------
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: rate-limit
  namespace: workshop
spec:
  rateLimit:
    # Average number of requests allowed per second
    average: 10
    # Maximum burst size (requests allowed above average temporarily)
    burst: 20
